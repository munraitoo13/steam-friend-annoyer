name: Build and Release Windows

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches:
      - main

permissions:
  contents: write # Required to create a release and upload assets

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build executable
        run: uv run python build/build.py

      - name: Verify build output
        run: dir dist/SteamFriendAnnoyer
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamFriendAnnoyer-windows
          path: dist/SteamFriendAnnoyer/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    # This job will only run for version tags.
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/0'))
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: SteamFriendAnnoyer-windows

      - name: Verify artifact contents
        run: |
          ls -R
          unzip SteamFriendAnnoyer.exe # It's a single file, but download-artifact might wrap it. Let's check.
          ls -R
        shell: bash

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: SteamFriendAnnoyer.exe
          body: "Automated release of SteamFriendAnnoyer for Windows."
          fail_on_unmatched_files: true
          generate_release_notes: true
          make_latest: true
          overwrite: true
