name: Build and Release Windows

on:
  push:
    branches:
      - main
    tags:
      - "v*" # Run on version tags like v1.0, v1.2.3
  pull_request:
    branches:
      - main

permissions:
  contents: write # Required to create a release and upload assets

jobs:
  build-and-release:
    runs-on: windows-latest
    # This job will only run for version tags.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build executable
        run: uv run python build/build.py

      - name: Verify build output
        run: |
          dir dist
          dir dist/SteamFriendAnnoyer
        shell: bash

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SteamFriendAnnoyer/SteamFriendAnnoyer.exe
          body: "Automated release of SteamFriendAnnoyer for Windows."
          fail_on_unmatched_files: true
          generate_release_notes: true
          make_latest: true
          overwrite: true
